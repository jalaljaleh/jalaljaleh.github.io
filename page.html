<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Mohammad Jalal Jaleh's Blog">
    <meta name="author" content="Jalal Jaleh">

    <title>Post</title>

    <link rel="shortcut icon" href="/assets/images/icon.png">

    <link href="/assets/lib/bootstrap-3.3.7-dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="/assets/fonts/font-awesome-4.7.0/css/font-awesome.css" rel="stylesheet">
    <link type="text/css" rel="stylesheet" href="/assets/fonts/sahel-font-v3.4.0/font-face.css">

    <link rel="stylesheet" href="http://fonts.googleapis.com/css?family=Alice|Open+Sans:400,300,700">
    <link rel="stylesheet" href="/assets/css/styles.css">

    <script src="/assets/js/loader-element.js" type="text/javascript"></script>
    <script src="/assets/js/loader-post.js" type="text/javascript"></script>
    <script src="/assets/js/support.js" type="text/javascript"></script>
    <script>
        load_header();
        load_footer();
    </script>
    <meta name="google-site-verification" content="OSeIpWNZUUOHShAmKnviCjhPP2X2g_U4dNI9f87d7mU" />
</head>
<body>

    <header id="header">
    </header>

    <main id="main">

        <div class="container">

            <div class="row topspace">
                <div id="post-id" class="col-sm-8 col-sm-offset-2">
                    <script>
                        load_page_post();
                    </script>
                </div>
            </div> <!-- /row post  -->

            <div class="row">
                <div class="col-sm-8 col-sm-offset-2">

                    <div id="comments">
                        <h3 id="comments-title" class="comments-title">X Comments</h3>
                        <br />
                        <br />
                        <ol id="comments-list" class="comments-list">
                        </ol>

                        <div class="clearfix"></div>


                        <div id="respond">
                            <h3 id="reply-title">Leave a Reply</h3>
                            <form id="commentform" class="">
                                <div class="form-group">
                                    <label for="inputName">Name</label>
                                    <input type="text" class="form-control" id="inputName" placeholder="Enter your name">
                                </div>
                                <div class="form-group">
                                    <label for="inputEmail">Email address <i class="text-danger">*</i></label>
                                    <input type="email" class="form-control" id="inputEmail" placeholder="Enter your email">
                                </div>
                                <div class="form-group">
                                    <label for="inputWeb">Website</label>
                                    <input type="nane" class="form-control" id="inputWeb" placeholder="http://">
                                </div>
                                <div class="form-group">
                                    <label for="inputWeb">Avatar Url</label>
                                    <input type="nane" class="form-control" id="inputImage" placeholder="http://">
                                </div>
                                <div class="form-group">
                                    <label for="inputComment">Comment</label>
                                    <textarea id="inputContent" class="form-control" rows="6"></textarea>
                                </div>
                            </form>
                            <div class="col-md-0 text-right">
                                <button type="submit" onclick="post()" class="btn btn-action">Submit</button>
                                <script>
                                    function post() {
                                        var name = document.getElementById("inputName").value;
                                        var email = document.getElementById("inputEmail").value;
                                        var web = document.getElementById("inputWeb").value;
                                        var image = document.getElementById("inputImage").value;

                                        var data = JSON.stringify({
                                            "author": name,
                                            "author_link": web,
                                            "date": new Date(),
                                            "content": content,
                                            "image": image,
                                            "email": email
                                        });
                                        var content = document.getElementById("inputContent").value + "%0D%0A%0D%0A" + data;

                                        window.open('mailto:jalaljaleh@gmail.com?subject=New Comment&body=' + content);
                                    }
                                </script>
                            </div>
                        </div>
                    </div>
                </div>
            </div> <!-- /row comments -->

            <br />
            <br />

            <div class="clearfix"></div>

        </div>	<!-- /container -->

    </main>



    <div id="footer">
    </div>

</body>
</html>
