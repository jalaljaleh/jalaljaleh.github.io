<li class="comment">
    <div>
        <img src="{image}" alt="Avatar" class="avatar">

        <div class="comment-meta">
            <span class="author"><a href="{author_link}">{author}</a></span>
            <span class="date"><a href="#">{date}</a></span>
        </div>

        <div class="comment-body">
            {content}
        </div>
    </div>
</li>
